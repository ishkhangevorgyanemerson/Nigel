  # Examples of VI represented in XML format

  ## Example 1

  <VI _name="My Library.lvlib:add random number to an array.vi">
    <FreeLabel comment="Add a random number to each number in an input array" uid="101" uid_parent="root"/>
    <Control _name="x" outputs="value:293.x" type="array{uint64.x}" uid="293" uid_parent="root" value="[]"/>
    <Structure _name="For Loop" count="" maxin="" maxout="" uid="577" uid_parent="root">
      <Tunnel _id="In1" inputs="value:293.x" mode="index" outputs="value:240.x" uid="240" uid_parent="577"/>
      <Constant outputs="value:227.upper bound (100)" type="double" uid="227" uid_parent="577" value="100"/>
      <FixedConst _name="PI" outputs="value:98.wire" uid="98" uid_parent="577"/>
      <Call inputs="upper bound (100):227.upper bound (100),lower bound (0):98.wire" instance="Random Number (Range) DBL.vi" outputs="number:89.number" target="Random Number (Range).vi" uid="89" uid_parent="577"/>
      <Node _name="Add" inputs="x:240.x,y:89.number" outputs="x+y:71.x+y" uid="71" uid_parent="577"/>
      <Tunnel _id="Out1" inputs="value:71.x+y" mode="index" outputs="value:225.wire" uid="225" uid_parent="577"/>
    </Structure>
    <Indicator _name="Result" inputs="value:225.wire" type="array{double}" uid="507" uid_parent="root" value="[]"/>
  </VI>

  The above VI includes a control called **x** which is an input to the VI of type array of 64-bit
  unsigned int, and an indicator called **Result** which is an
  output of the VI of type array of double. The VI also includes a constant, a LabVIEW built-in
  constant for **PI**, a call to a polymorphic subVI called **Random Number (Range).vi**
  which has an instance name **Random Number (Range) DBL.vi** and a LabVIEW built-in
  node called **Add**. The for loop iterates over each element of the input array **x** and adds a
  random number to it, outputting the result to the indicator **Result**.

  ## Example 2

  <VI _name="multiply by 3 N number of times.vi">
    <Control _name="Initial" outputs="value:62.Initial" type="double" uid="62" uid_parent="root" value="1"/>
    <Control _name="N" outputs="value:361.N" type="int32" uid="361" uid_parent="root" value="2"/>
    <Structure _name="For Loop" count="" maxin="361.N" maxout="" uid="72" uid_parent="root">
      <Constant outputs="value:202.y" type="double" uid="202" uid_parent="72" value="3"/>
      <Node _name="Multiply" inputs="x:161.Initial,y:202.y" outputs="x*y:161.x*y" uid="161" uid_parent="72"/>
      <ShiftReg uid="120" uid_parent="72">
        <Left inputs="value:62.Initial" outputs="value:161.Initial" uid="127" uid_parent="120"/>
        <Right inputs="value:161.x*y" outputs="value:130.Initial" uid="130" uid_parent="120"/>
      </ShiftReg>
    </Structure>
    <Indicator _name="Result" inputs="value:130.Initial" type="double" uid="280" uid_parent="root" value="0"/>
  </VI>

  This VI multiplies an initial value by 3 a specified number of times (N) using a for loop and a shift register to store the intermediate results.

  # Common mistakes to avoid

  - **Placing a polled control outside the loop.** A `<Control>` whose value must be read fresh at every iteration (e.g., a stop button) must have `uid_parent` set to the loop's `uid`. If it is placed outside the loop and its value is brought in via a `<Tunnel>`, LabVIEW reads the value only once before the loop begins — the user's button press is never detected during the run.
  - **Breaking the error chain at loop boundaries.** An `error out` wire produced outside a loop cannot be wired directly to a node inside it, and an `error out` produced inside cannot reach nodes outside. Always bridge the boundary: use `<Tunnel _id="InN">` to feed an incoming error cluster into the loop, and `<Tunnel _id="OutN">` to carry the loop's final error cluster out to subsequent cleanup nodes.
  - **Non-ASCII characters in attribute values cause LabVIEW XML parse errors.** The validator passes XML over gRPC and never catches non-ASCII characters, but LabVIEW's own parser fails when loading the file. Use only printable ASCII in all attribute values (`_name`, `description`, `value`, etc.): write `-` or `to` instead of an en/em dash, avoid curly quotes, accented characters, or any Unicode above U+007F.
  - **XML comments inside `<VI>` cause `Error 53` in the VI generator.** Confirmed by live validation: any XML comment node (`<!-- ... -->`) placed inside the `<VI>` document causes LabVIEW's VI generator (`LV AI Core.lvlibp:VI generator.vi`) to fail immediately with `Error 53 (Hex 0x35) Manager call not supported` before the diagram is evaluated. The identical XML with all comments removed passes validation. Never emit XML comments in VI XML output.

  # Known wiring rules

  - **The error chain must be tunneled across loop boundaries** — `error out` wires from nodes outside a loop cannot be directly referenced by nodes inside a loop, and vice versa. Use a `<Tunnel _id="InN">` to carry an incoming `error out` into the loop, and a `<Tunnel _id="OutN">` to carry the final `error out` back out so it can be wired to subsequent nodes after the loop.

  ## Case Structure Output Tunnels
  - Every `<Tunnel _id="OutN">` on a Case Structure MUST have `inputs="value:..."` 
  wired in **every single CaseFrame**, no exceptions.
  - For "don't care" cases, supply a typed default constant and wire that value to the frame-local `OutN` tunnel.

  ## Case Structure Input Tunnels
  - Define each input tunnel on the Case Structure parent as `<Tunnel _id="InN" inputs="value:outside_scope_wire" ... uid_parent="<case_structure_uid>"/>`.
  - In every CaseFrame, add a matching `<Tunnel _id="InN" outputs="value:inside_scope_wire" ... uid_parent="<case_frame_uid>"/>`.
  - Keep the `_id` stable across parent and frame-local tunnel elements. Mapping is done by `_id`, not by uid number.

  ## Quick tunnel direction checklist
  - Parent structure + `inputs` means data enters the structure (Tunnel In).
  - Frame/local + `outputs` means that tunneled input becomes available inside that frame.
  - Frame/local + `inputs` means data leaves that frame (Tunnel Out).
  - Parent structure + `outputs` means tunneled output becomes available outside the structure.

  ## Minimal valid Case Structure tunnel template
  Use this as a copy/paste baseline when creating a Case Structure with one input tunnel and one output tunnel.

  <Structure _name="Case Structure" selectin="61.value" selectout="," uid="300" uid_parent="root">
    <Tunnel _id="In1" inputs="value:100.in_wire" uid="301" uid_parent="300"/>

    <CaseFrame label="False case" selector="False" uid="310" uid_parent="300">
      <Tunnel _id="In1" outputs="value:311.in_value" uid="311" uid_parent="310"/>
      <Node _name="Not" inputs="x:311.in_value" outputs=".not. x?:312.not_x" uid="312" uid_parent="310"/>
      <Tunnel _id="Out1" inputs="value:312.not_x" uid="313" uid_parent="310"/>
    </CaseFrame>

    <CaseFrame label="True case" selector="True" uid="320" uid_parent="300">
      <Tunnel _id="In1" outputs="value:321.in_value" uid="321" uid_parent="320"/>
      <Tunnel _id="Out1" inputs="value:321.in_value" uid="322" uid_parent="320"/>
    </CaseFrame>

    <Tunnel _id="Out1" outputs="value:302.out_wire" uid="302" uid_parent="300"/>
  </Structure>
  - For "don't care" cases, supply a typed default constant

  ## Compound Arithmetic for multi-input boolean combine
  - Use `<Node _name="Compound Arithmetic" inputs="value:A,value:B,value:C" inversions=" , , , " operation="or" outputs="result:N.result" uid="N" uid_parent="..."/>` to OR multiple booleans together (e.g. stop button + task done? + error status) in a single node. The `inversions` attribute contains a space-separated list with one entry per input plus one for the output (all spaces = no inversion).
